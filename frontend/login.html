<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Healthy Habits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <div class="container nav-content">
      <a href="index.html" class="nav-logo">Healthy Habits</a>
      <button class="mobile-menu-toggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="diet.html" class="nav-link">Diet</a></li>
        <li><a href="fitness.html" class="nav-link">Fitness</a></li>
        <li><a href="screentime.html" class="nav-link">Screen Time</a></li>
        <li><a href="goals.html" class="nav-link">Goals</a></li>
        <li class="nav-login"><a href="login.html" class="nav-link active">Login</a></li>
      </ul>
    </div>
  </nav>

  <main class="login-main">
    <section class="login-section">
      <div class="container">
        <div class="login-card">
          <h1>Welcome back</h1>
          <p class="login-subtitle">Sign in to continue tracking your family's healthy habits.</p>

          <form id="login-form" class="login-form" novalidate>
            <div class="form-group">
              <label for="email">Username or Email</label>
              <input
                type="text"
                id="email"
                name="identifier"
                placeholder="your username or email"
                required
                autocomplete="username"
              >
              <span class="form-error" id="email-error" role="alert"></span>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              >
              <span class="form-error" id="password-error" role="alert"></span>
            </div>

            <button type="submit" class="login-btn">Sign in</button>

           
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; <span id="current-year"></span> Healthy Habits. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
